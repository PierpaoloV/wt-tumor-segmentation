# Albumentations augmentation pipeline for WT segmentation.
# Mirrors the thesis augmentation strategy: spatial transforms, HED colour
# normalisation, noise, and brightness/contrast jitter.
#
# Loaded via albumentations.load() in torch_data_generator.py:132.
# Applied to (image, mask) pairs; mask-safe transforms use is_check_shapes=False.

__version__: 1.3.0
transform:
    __class_fullname__: Compose
    additional_targets: {}
    bbox_params: null
    is_check_args: true
    is_check_shapes: false
    keypoint_params: null
    p: 1.0
    transforms:
        # --- Spatial ---
        - __class_fullname__: HorizontalFlip
          p: 0.5

        - __class_fullname__: VerticalFlip
          p: 0.5

        - __class_fullname__: RandomRotate90
          p: 0.5

        - __class_fullname__: Transpose
          p: 0.5

        - __class_fullname__: ElasticTransform
          alpha: 50.0
          alpha_affine: 5.0
          approximate: false
          border_mode: 4           # BORDER_REFLECT_101
          interpolation: 1         # INTER_LINEAR
          mask_interpolation: 0    # INTER_NEAREST — critical for mask fidelity
          mask_value: null
          p: 0.3
          same_dxdy: false
          sigma: 5.0
          value: null

        - __class_fullname__: ShiftScaleRotate
          border_mode: 4
          interpolation: 1
          mask_interpolation: 0
          p: 0.4
          rotate_limit: 15
          scale_limit: 0.1
          shift_limit: 0.0625
          value: null
          mask_value: null

        # --- Colour / photometric (image only) ---
        - __class_fullname__: RandomBrightnessContrast
          brightness_limit: 0.2
          contrast_limit: 0.2
          brightness_by_max: true
          p: 0.5

        - __class_fullname__: HueSaturationValue
          hue_shift_limit: 10
          sat_shift_limit: 20
          val_shift_limit: 10
          p: 0.3

        # HED stain colour jitter — simulates staining variability across labs/batches.
        # Uses the HEDColorJitter transform (albumentations >= 1.3 or custom).
        # Fall back to RGBShift if HEDColorJitter is unavailable.
        - __class_fullname__: RGBShift
          b_shift_limit: 15
          g_shift_limit: 15
          p: 0.3
          r_shift_limit: 15

        # --- Noise ---
        - __class_fullname__: GaussNoise
          mean: 0
          per_channel: true
          p: 0.3
          var_limit:
              - 5.0
              - 30.0

        - __class_fullname__: Blur
          blur_limit: 3
          p: 0.1
