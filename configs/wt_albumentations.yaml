# Albumentations augmentation pipeline for WT segmentation.
# Compatible with albumentations==1.3.1 (signatures verified).

__version__: 1.3.1
transform:
    __class_fullname__: Compose
    bbox_params: null
    keypoint_params: null
    additional_targets: {}
    p: 1.0
    is_check_shapes: false
    transforms:
        # --- Spatial ---
        - __class_fullname__: HorizontalFlip
          always_apply: false
          p: 0.5

        - __class_fullname__: VerticalFlip
          always_apply: false
          p: 0.5

        - __class_fullname__: RandomRotate90
          always_apply: false
          p: 0.5

        - __class_fullname__: Transpose
          always_apply: false
          p: 0.5

        - __class_fullname__: ElasticTransform
          alpha: 50.0
          sigma: 5.0
          alpha_affine: 5.0
          interpolation: 1
          border_mode: 4
          value: null
          mask_value: null
          approximate: false
          same_dxdy: false
          always_apply: false
          p: 0.3

        - __class_fullname__: ShiftScaleRotate
          shift_limit: 0.0625
          scale_limit: 0.1
          rotate_limit: 15
          interpolation: 1
          border_mode: 4
          value: null
          mask_value: null
          always_apply: false
          p: 0.4

        # --- Colour ---
        - __class_fullname__: RandomBrightnessContrast
          brightness_limit: 0.2
          contrast_limit: 0.2
          brightness_by_max: true
          always_apply: false
          p: 0.5

        - __class_fullname__: HueSaturationValue
          hue_shift_limit: 10
          sat_shift_limit: 20
          val_shift_limit: 10
          always_apply: false
          p: 0.3

        - __class_fullname__: RGBShift
          r_shift_limit: 15
          g_shift_limit: 15
          b_shift_limit: 15
          always_apply: false
          p: 0.3

        # --- Noise ---
        - __class_fullname__: GaussNoise
          var_limit:
              - 5.0
              - 30.0
          mean: 0
          per_channel: true
          always_apply: false
          p: 0.3

        - __class_fullname__: Blur
          blur_limit: 3
          always_apply: false
          p: 0.1
