# Albumentations augmentation pipeline for WT segmentation.
# Uses only stable parameters compatible with albumentations >= 1.0.

__version__: 1.3.1
transform:
    __class_fullname__: Compose
    additional_targets: {}
    bbox_params: null
    is_check_args: true
    is_check_shapes: false
    keypoint_params: null
    p: 1.0
    transforms:
        # --- Spatial ---
        - __class_fullname__: HorizontalFlip
          p: 0.5

        - __class_fullname__: VerticalFlip
          p: 0.5

        - __class_fullname__: RandomRotate90
          p: 0.5

        - __class_fullname__: Transpose
          p: 0.5

        - __class_fullname__: ElasticTransform
          alpha: 50.0
          sigma: 5.0
          alpha_affine: 5.0
          interpolation: 1
          border_mode: 4
          value: null
          mask_value: null
          approximate: false
          p: 0.3

        - __class_fullname__: ShiftScaleRotate
          shift_limit: 0.0625
          scale_limit: 0.1
          rotate_limit: 15
          interpolation: 1
          border_mode: 4
          value: null
          mask_value: null
          p: 0.4

        # --- Colour ---
        - __class_fullname__: RandomBrightnessContrast
          brightness_limit: 0.2
          contrast_limit: 0.2
          p: 0.5

        - __class_fullname__: HueSaturationValue
          hue_shift_limit: 10
          sat_shift_limit: 20
          val_shift_limit: 10
          p: 0.3

        - __class_fullname__: RGBShift
          r_shift_limit: 15
          g_shift_limit: 15
          b_shift_limit: 15
          p: 0.3

        # --- Noise ---
        - __class_fullname__: GaussNoise
          var_limit:
              - 5.0
              - 30.0
          mean: 0
          p: 0.3

        - __class_fullname__: Blur
          blur_limit: 3
          p: 0.1
